<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KidStack Skill Extraction PoC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; max-width: 720px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 18px; color: #fff; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 20px; }
    .key-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .key-row input { flex: 1; padding: 8px 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-size: 13px; }
    .phases { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .phase { padding: 4px 10px; border-radius: 12px; font-size: 11px; background: #1a1a1a; border: 1px solid #333; color: #888; }
    .phase.active { background: #1a2a1a; border-color: #2a5a2a; color: #6c6; }
    .phase.done { background: #1a1a2a; border-color: #2a2a5a; color: #88a; }
    .chat { border: 1px solid #222; border-radius: 8px; background: #111; min-height: 400px; max-height: 60vh; overflow-y: auto; padding: 16px; margin-bottom: 12px; }
    .msg { margin-bottom: 12px; line-height: 1.5; }
    .msg.user { color: #6af; }
    .msg.user::before { content: 'You: '; font-weight: 600; }
    .msg.assistant { color: #ccc; }
    .msg.assistant::before { content: 'GStack: '; color: #6c6; font-weight: 600; }
    .msg.system { color: #666; font-style: italic; font-size: 12px; }
    .input-row { display: flex; gap: 8px; }
    .input-row input { flex: 1; padding: 10px 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 14px; }
    .input-row input:focus { outline: none; border-color: #555; }
    button { padding: 10px 20px; background: #2a5a2a; border: none; border-radius: 8px; color: #fff; font-size: 14px; cursor: pointer; }
    button:hover { background: #3a7a3a; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    .stats { font-size: 11px; color: #555; margin-top: 8px; }
    .cost { color: #c90; }
  </style>
</head>
<body>
  <h1>gstack skill extraction PoC</h1>
  <p class="subtitle">/office-hours judgment intelligence, extracted prompt, Anthropic Messages API</p>

  <div class="key-row">
    <input type="password" id="apiKey" placeholder="sk-ant-... (your Anthropic API key)" />
  </div>

  <div class="phases" id="phases"></div>
  <div class="chat" id="chat"></div>

  <div class="input-row">
    <input type="text" id="userInput" placeholder="Type your answer..." />
    <button id="sendBtn" onclick="send()">Send</button>
  </div>

  <div class="stats" id="stats"></div>

  <script>
    const chat = document.getElementById('chat')
    const phases = document.getElementById('phases')
    const input = document.getElementById('userInput')
    const sendBtn = document.getElementById('sendBtn')
    const stats = document.getElementById('stats')

    let messages = []
    let totalInput = 0
    let totalOutput = 0
    let turns = 0

    // Haiku pricing per million tokens
    const INPUT_COST = 0.80
    const OUTPUT_COST = 4.00

    input.addEventListener('keydown', e => { if (e.key === 'Enter' && !sendBtn.disabled) send() })

    // Auto-start: send empty-ish first message to kick off the session
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('ks_api_key')
      if (saved) document.getElementById('apiKey').value = saved
    })

    function addMsg(role, text) {
      const div = document.createElement('div')
      div.className = `msg ${role}`
      div.textContent = text
      chat.appendChild(div)
      chat.scrollTop = chat.scrollHeight
      return div
    }

    function updateCost() {
      const cost = (totalInput / 1e6 * INPUT_COST) + (totalOutput / 1e6 * OUTPUT_COST)
      stats.innerHTML = `Turn ${turns} · ${totalInput.toLocaleString()} in / ${totalOutput.toLocaleString()} out · <span class="cost">$${cost.toFixed(4)}</span>`
    }

    async function send() {
      const text = input.value.trim()
      const apiKey = document.getElementById('apiKey').value.trim()

      if (!apiKey) { alert('Enter your Anthropic API key first'); return }
      localStorage.setItem('ks_api_key', apiKey)

      if (!text && messages.length > 0) return

      // First turn: auto-prompt if empty
      const userMsg = text || "I have an idea I want to explore."
      if (text) input.value = ''

      messages.push({ role: 'user', content: userMsg })
      addMsg('user', userMsg)
      turns++

      sendBtn.disabled = true
      const assistantDiv = addMsg('assistant', '')

      try {
        const res = await fetch('/api/skill', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
          body: JSON.stringify({ skill: 'office-hours', messages }),
        })

        const reader = res.body.getReader()
        const decoder = new TextDecoder()
        let buffer = ''
        let fullText = ''

        while (true) {
          const { done, value } = await reader.read()
          if (done) break

          buffer += decoder.decode(value, { stream: true })
          const lines = buffer.split('\n')
          buffer = lines.pop() // keep incomplete line

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue
            const data = JSON.parse(line.slice(6))

            if (data.type === 'text') {
              fullText += data.content
              assistantDiv.textContent = fullText
              chat.scrollTop = chat.scrollHeight
            }
            if (data.type === 'skill_meta' && data.phases) {
              phases.innerHTML = data.phases.map(p =>
                `<span class="phase" title="${p.description}">${p.label}</span>`
              ).join('')
            }
            if (data.type === 'tokens') {
              totalInput += data.input
              totalOutput += data.output
              updateCost()
            }
            if (data.type === 'error') {
              assistantDiv.textContent = `Error: ${data.message}`
              assistantDiv.style.color = '#f66'
            }
          }
        }

        if (fullText) {
          messages.push({ role: 'assistant', content: fullText })
        }
      } catch (err) {
        assistantDiv.textContent = `Network error: ${err.message}`
        assistantDiv.style.color = '#f66'
      }

      sendBtn.disabled = false
      input.focus()
    }
  </script>
</body>
</html>
